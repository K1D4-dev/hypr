# ~/.config/hypr/hyprtoolkit.conf
#
# Тема для hyprlauncher (і всього, що збудовано на hyprtoolkit:
# hyprpolkitagent, майбутні QML/QT-хелпери тощо).
# Монохром чорно-білий, узгоджений з hyprland.lua
# (rounding=8, active_border=ffffff, inactive_border=aaaaaa).

# ---- Кольори ----
background       = 0xFF0d0d0d   # фон вікна
base             = 0xFF161616   # фон полів вводу / списків
alternate_base   = 0xFF212121   # фон "виділеного" рядка (наведення/hover)
text             = 0xFFdcdcdc   # звичайний текст
bright_text      = 0xFFffffff   # яскравий текст (заголовки, вибраний пункт)

accent           = 0xFFffffff   # основний акцент — білий, як active_border
accent_secondary = 0xFFaaaaaa   # другорядний акцент — сірий, як inactive_border

# ---- Шрифти ----
font_family            = Sans Serif
font_family_monospace  = monospace

h1_size          = 19
h2_size          = 15
h3_size          = 13
font_size        = 11
small_font_size  = 10

# ---- Заокруглення (звідси ж бере й hyprlauncher, з версії, де є "ui: get rounding radii from hyprtoolkit") ----
rounding_large = 8   # великі елементи — вікно, картки
rounding_small = 4   # малі елементи — інпут, бейджі

# ---- Іконки ----
icon_theme = 
